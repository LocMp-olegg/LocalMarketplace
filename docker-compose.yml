services:

  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgis/postgis:17-3.5
    container_name: locmp-postgres
    restart: unless-stopped
    command: ["postgres", "-p", "5430"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123Qq123
      POSTGRES_DB: LocalMarketplaceDb
    ports:
      - "5430:5430"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -p 5430"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management
    container_name: locmp-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: locmp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: locmp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ─────────────────────────────────────────────────

  identity:
    build:
      context: .
      dockerfile: IdentityService/Dockerfile
    image: locmp-identity:latest
    container_name: locmp-identity
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      Minio__Endpoint: "locmp-minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__BucketName: "locmp-identity"
      Minio__UseSSL: "false"
      Minio__PublicEndpoint: "localhost:9000"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  catalog:
    build:
      context: .
      dockerfile: CatalogService/Dockerfile
    image: locmp-catalog:latest
    container_name: locmp-catalog
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      Minio__Endpoint: "locmp-minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__BucketName: "locmp-catalog"
      Minio__UseSSL: "false"
      Minio__PublicEndpoint: "localhost:9000"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  orders:
    build:
      context: .
      dockerfile: OrderService/Dockerfile
    image: locmp-orders:latest
    container_name: locmp-orders
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      Minio__Endpoint: "locmp-minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__BucketName: "locmp-orders"
      Minio__UseSSL: "false"
      Minio__PublicEndpoint: "localhost:9000"
      Services__Catalog: "http://locmp-catalog:8080/"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  reviews:
    build:
      context: .
      dockerfile: ReviewService/Dockerfile
    image: locmp-reviews:latest
    container_name: locmp-reviews
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      Minio__Endpoint: "locmp-minio:9000"
      Minio__AccessKey: "minioadmin"
      Minio__SecretKey: "minioadmin"
      Minio__BucketName: "review-media"
      Minio__UseSSL: "false"
      Minio__PublicEndpoint: "localhost:9000"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  notifications:
    build:
      context: .
      dockerfile: NotificationService/Dockerfile
    image: locmp-notifications:latest
    container_name: locmp-notifications
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  analytics:
    build:
      context: .
      dockerfile: AnalyticsService/Dockerfile
    image: locmp-analytics:latest
    container_name: locmp-analytics
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__LocalMarketplaceDb: "Host=locmp-postgres;Port=5430;Database=LocalMarketplaceDb;Username=postgres;Password=123Qq123"
      ConnectionStrings__RabbitMq: "amqp://guest:guest@locmp-rabbitmq:5672"
      ConnectionStrings__Redis: "locmp-redis:6379"
      JwtAuthenticationOptions__Authority: "http://locmp-identity:8080"
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity:
        condition: service_started

  gateway:
    build:
      context: .
      dockerfile: Gateway/Dockerfile
    image: locmp-gateway:latest
    container_name: locmp-gateway
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      AuthenticationOptions__Authority: "http://locmp-identity:8080"
      CorsPoliticsOptions__AllowedOrigins: "http://localhost:4200"
      ConnectionStrings__Redis: "locmp-redis:6379"
    ports:
      - "5000:8080"
    depends_on:
      redis:
        condition: service_healthy
      identity:
        condition: service_started
      catalog:
        condition: service_started
      orders:
        condition: service_started
      reviews:
        condition: service_started
      notifications:
        condition: service_started
      analytics:
        condition: service_started

volumes:
  postgres-data:
  rabbitmq-data:
  minio-data:
  redis-data:
